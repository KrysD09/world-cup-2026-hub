name: World Cup Data Update

on:
  schedule:
    # Three times daily (cron is in UTC; ET = UTC-4 during the tournament)
    - cron: '0 4 * * *'    # 12:00 AM ET (midnight) — catches the day's late evening games
    - cron: '0 19 * * *'   # 3:00 PM ET — catches afternoon/early games
    - cron: '0 1 * * *'    # 9:00 PM ET — catches mid-evening games
  workflow_dispatch:        # Manual trigger button in the Actions tab

jobs:
  collect-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect match results
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/collect_matches.py

      - name: Collect venue weather data
        run: python scripts/collect_weather.py

      - name: Update confederation scoreboard
        run: python scripts/update_scoreboard.py

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "Data update $(date -u +'%Y-%m-%d %H:%M') UTC [automated]"
          git push
